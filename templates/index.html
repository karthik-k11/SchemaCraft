<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SchemaCraft</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="sidebar">

    <h2>SchemaCraft</h2>

    <ul>
        <li>Dashboard</li>
        <li>Schema Explorer</li>
        <li>Health Report</li>
        <li>History</li>
        <li>Settings</li>
    </ul>

</div>

<div class="main-content">

    <header>

        <h1>Understand any database in seconds.</h1>

    </header>

    <form method="POST"
          enctype="multipart/form-data"
          class="upload-box">

        <input type="file"
               name="database"
               accept=".db,.sqlite,.sqlite3">

        <button type="submit">
            Upload Database
        </button>

    </form>

    {% if message %}

    <div class="message">
        {{ message }}
    </div>

    {% endif %}

    <div class="dashboard">

        <div class="card">
            <h3>Database</h3>
            <p>{{ database_name }}</p>
        </div>

        <div class="card">
            <h3>Total Tables</h3>
            <p>--</p>
        </div>

        <div class="card">
            <h3>Total Views</h3>
            <p>--</p>
        </div>

        <div class="card">
            <h3>Total Rows</h3>
            <p>--</p>
        </div>

    </div>

</div>

<script src="{{ url_for('static',
filename='script.js') }}"></script>

</body>

</html>
