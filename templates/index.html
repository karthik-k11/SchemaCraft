<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchemaCraft</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="sidebar">
        <h2>SchemaCraft</h2>

        <ul>
            <li>Dashboard</li>
            <li>Schema Explorer</li>
            <li>Health Report</li>
            <li>History</li>
            <li>Settings</li>
        </ul>
    </div>

    <div class="main-content">

        <header>
            <h1>Understand any database in seconds.</h1>
        </header>

        <div class="dashboard">

            <div class="card">
                <h3>Database</h3>
                <p>No database loaded</p>
            </div>

            <div class="card">
                <h3>Total Tables</h3>
                <p>--</p>
            </div>

            <div class="card">
                <h3>Total Views</h3>
                <p>--</p>
            </div>

            <div class="card">
                <h3>Total Rows</h3>
                <p>--</p>
            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
